mutation CreateUser(
  $uid: String!
  $name: String
  $preferredLanguage: String
  $mobile: String
  $role: String @retired
) @auth(level: PUBLIC) {
  user_insert(
    data: {
      uid: $uid
      name: $name
      preferredLanguage: $preferredLanguage
      mobile: $mobile
    }
  )
}

query GetUserByUid($uid: String!) @auth(level: PUBLIC) {
  users(where: { uid: { eq: $uid } }, limit: 1) {
    id
    uid
    name
    preferredLanguage
    mobile
  }
}

mutation UpsertUserProfile(
  $id: UUID
  $uid: String!
  $name: String
  $preferredLanguage: String
  $mobile: String
) @auth(level: PUBLIC) {
  user_upsert(
    data: {
      id: $id
      uid: $uid
      name: $name
      preferredLanguage: $preferredLanguage
      mobile: $mobile
    }
  )
}

mutation CreateLegalAidCenter(
  $name: String!
  $address: String!
  $phone: String!
  $latitude: Float!
  $longitude: Float!
  $freeServices: Boolean!
  $categories: [String!]!
  $timings: String
  $description: String
) @auth(level: PUBLIC) {
  legalAidCenter_insert(
    data: {
      name: $name
      address: $address
      phone: $phone
      latitude: $latitude
      longitude: $longitude
      freeServices: $freeServices
      categories: $categories
      timings: $timings
      description: $description
    }
  )
}

mutation CreateUserQuery(
  $userId: UUID
  $queryText: String
  $detectedLanguage: String!
  $selectedResponseLanguage: String
  $legalCategoryDetected: String
  $intakeFollowUpQuestion: String
  $intakeFollowUpAnswer: String
  $isUrgent: Boolean!
  $isAnonymous: Boolean!
  $aiResponse: String
  $ragVerificationStatus: String
  $ragConfidence: Float
  $ragCitationsJson: String
) @auth(level: PUBLIC) {
  userQuery_insert(
    data: {
      userId: $userId
      queryText: $queryText
      detectedLanguage: $detectedLanguage
      selectedResponseLanguage: $selectedResponseLanguage
      legalCategoryDetected: $legalCategoryDetected
      intakeFollowUpQuestion: $intakeFollowUpQuestion
      intakeFollowUpAnswer: $intakeFollowUpAnswer
      isUrgent: $isUrgent
      isAnonymous: $isAnonymous
      aiResponse: $aiResponse
      ragVerificationStatus: $ragVerificationStatus
      ragConfidence: $ragConfidence
      ragCitationsJson: $ragCitationsJson
    }
  )
}

mutation CreateAppointment(
  $userName: String!
  $userContact: String!
  $problemSummary: String!
  $preferredDate: Date!
  $status: String!
) @auth(level: PUBLIC) {
  appointment_insert(
    data: {
      userName: $userName
      userContact: $userContact
      problemSummary: $problemSummary
      preferredDate: $preferredDate
      status: $status
      legalAidCenterId: "d69b3074-6725-4b08-8e8e-d95c47be73a1"
    }
  )
}

mutation CreateAppointmentWithCenter(
  $userId: UUID
  $legalAidCenterId: UUID!
  $userName: String!
  $userContact: String!
  $problemSummary: String!
  $preferredDate: Date!
  $preferredTime: String
  $status: String!
) @auth(level: PUBLIC) {
  appointment_insert(
    data: {
      userId: $userId
      legalAidCenterId: $legalAidCenterId
      userName: $userName
      userContact: $userContact
      problemSummary: $problemSummary
      preferredDate: $preferredDate
      preferredTime: $preferredTime
      status: $status
    }
  )
}

query ListAppointmentsByUserId($userId: UUID!, $limit: Int!) @auth(level: PUBLIC) {
  appointments(
    where: { userId: { eq: $userId } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    userName
    userContact
    problemSummary
    preferredDate
    preferredTime
    status
    createdAt
    legalAidCenter {
      id
      name
      address
      phone
    }
  }
}

query ListLegalAidCenters($limit: Int!) @auth(level: PUBLIC) {
  legalAidCenters(orderBy: [{ createdAt: DESC }], limit: $limit) {
    id
    name
    address
    phone
    latitude
    longitude
    freeServices
    categories
    timings
    description
    createdAt
  }
}

mutation DeleteAppointmentById($id: UUID!) @auth(level: PUBLIC) {
  appointment_delete(key: { id: $id })
}

mutation CreateLegalChunk(
  $lawName: String!
  $sourceUrl: String
  $sourceFile: String
  $page: Int
  $chunkIndex: Int!
  $text: String!
  $tokens: [String!]!
  $embeddingJson: String
) @auth(level: PUBLIC) {
  legalChunk_insert(
    data: {
      lawName: $lawName
      sourceUrl: $sourceUrl
      sourceFile: $sourceFile
      page: $page
      chunkIndex: $chunkIndex
      text: $text
      tokens: $tokens
      embeddingJson: $embeddingJson
    }
  )
}

query SearchLegalChunks($term: String!, $limit: Int!) @auth(level: PUBLIC) {
  legalChunks(
    where: { text: { contains: $term } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    lawName
    sourceUrl
    sourceFile
    page
    chunkIndex
    text
    tokens
    embeddingJson
    createdAt
  }
}

query SearchLegalChunksByLaw($lawName: String!, $term: String!, $limit: Int!)
@auth(level: PUBLIC) {
  legalChunks(
    where: {
      _and: [{ lawName: { eq: $lawName } }, { text: { contains: $term } }]
    }
    orderBy: [{ chunkIndex: ASC }]
    limit: $limit
  ) {
    id
    lawName
    sourceUrl
    sourceFile
    page
    chunkIndex
    text
    tokens
    embeddingJson
    createdAt
  }
}

query ListLegalChunksByLaw($lawName: String!, $limit: Int!)
@auth(level: PUBLIC) {
  legalChunks(
    where: { lawName: { eq: $lawName } }
    orderBy: [{ chunkIndex: ASC }]
    limit: $limit
  ) {
    id
    lawName
    sourceUrl
    sourceFile
    page
    chunkIndex
    text
    tokens
    embeddingJson
    createdAt
  }
}

mutation CreateUser($uid: String!, $name: String, $preferredLanguage: String, $mobile: String) @auth(level: PUBLIC) {
  user_insert(data: {
    uid: $uid,
    name: $name,
    preferredLanguage: $preferredLanguage,
    mobile: $mobile
  })
}

mutation CreateAppointment(
  $userId: String,
  $legalAidCenterId: String!,
  $userName: String!,
  $userContact: String!,
  $problemSummary: String!,
  $preferredDate: Date!,
  $preferredTime: String,
  $status: String!
) @auth(level: PUBLIC) {
  appointment_insert(data: {
    userId: $userId,
    legalAidCenterId: $legalAidCenterId,
    userName: $userName,
    userContact: $userContact,
    problemSummary: $problemSummary,
    preferredDate: $preferredDate,
    preferredTime: $preferredTime,
    status: $status
  })
}

query ListCenters @auth(level: PUBLIC) {
  legalAidCenterCollection {
    edges {
      node {
        id
        name
        address
        phone
        latitude
        longitude
        freeServices
        categories
        timings
        description
      }
    }
  }
}

query ListAppointmentsByCenter($centerId: String!) @auth(level: PUBLIC) {
  appointmentCollection(where: { legalAidCenterId: { eq: $centerId } }, orderBy: { preferredDate: Desc }) {
    edges {
      node {
        id
        userName
        userContact
        problemSummary
        preferredDate
        preferredTime
        status
        createdAt
      }
    }
  }
}

mutation CreateQuery(
  $userId: String,
  $queryText: String,
  $detectedLanguage: String!,
  $legalCategoryDetected: String,
  $isUrgent: Boolean!,
  $isAnonymous: Boolean!,
  $aiResponse: String
) @auth(level: PUBLIC) {
  userQuery_insert(data: {
    userId: $userId,
    queryText: $queryText,
    detectedLanguage: $detectedLanguage,
    legalCategoryDetected: $legalCategoryDetected,
    isUrgent: $isUrgent,
    isAnonymous: $isAnonymous,
    aiResponse: $aiResponse
  })
}

mutation CreateUserQuery(
  $queryText: String
  $detectedLanguage: String!
  $legalCategoryDetected: String
  $isUrgent: Boolean!
  $isAnonymous: Boolean!
  $aiResponse: String
) @auth(level: PUBLIC) {
  userQuery_insert(
    data: {
      queryText: $queryText
      detectedLanguage: $detectedLanguage
      legalCategoryDetected: $legalCategoryDetected
      isUrgent: $isUrgent
      isAnonymous: $isAnonymous
      aiResponse: $aiResponse
    }
  )
}
